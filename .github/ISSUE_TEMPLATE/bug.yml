name: Bug report
description: Something broken in Hex UI (components, CLI, MCP server, or docs site)
labels: ["bug"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Which package is affected?
      options:
        - "@hex-ui/components"
        - "@hex-ui/cli"
        - "@hex-ui/mcp"
        - "@hex-ui/tokens"
        - "@hex-ui/registry"
        - Docs site (hex-ui.dev)
        - Unsure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package version
      description: Output of `pnpm ls @hex-ui/<package>` or `npm ls @hex-ui/<package>`.
      placeholder: "0.2.0"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal code or a link to a repro repo. Paste full commands you ran.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Paste error messages, stack traces, or screenshots.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, package manager, OS, browser (if docs site).
      value: |
        - Node:
        - pnpm:
        - OS:
        - Browser (if relevant):
    validations:
      required: true
