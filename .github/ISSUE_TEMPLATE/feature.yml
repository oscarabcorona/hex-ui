name: Feature request
description: Propose a new component, CLI command, MCP tool, or docs improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: surface
    attributes:
      label: Which surface?
      options:
        - New component
        - Existing component (new variant / prop)
        - CLI (new command / flag)
        - MCP server (new tool)
        - Docs site
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem are you solving?
      description: Describe the user situation. "As a X, I want Y so that Z."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Sketch the API, behavior, or UX. Code snippets welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, workarounds with existing components, etc.

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to open a PR for this
